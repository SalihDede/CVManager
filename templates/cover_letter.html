<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5pt;
    color: #1a1a1a;
    background: white;
    padding: 28mm 22mm;
    line-height: 1.6;
  }

  .header {
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 10px;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 16pt;
    font-weight: 700;
  }

  .header .meta {
    font-size: 9pt;
    color: #555;
    margin-top: 4px;
  }

  .to-block {
    margin-bottom: 20px;
    font-size: 9.5pt;
    color: #333;
  }

  .to-block strong {
    font-size: 10pt;
    color: #1a1a1a;
  }

  .body-text {
    white-space: pre-line;
    font-size: 10pt;
    line-height: 1.65;
    color: #222;
  }
</style>
</head>
<body>

<div class="header">
  <h1>{{ personal.name }}</h1>
  <div class="meta">
    {{ personal.email }} &nbsp;·&nbsp; {{ personal.phone }} &nbsp;·&nbsp; {{ personal.location }}
  </div>
</div>

<div class="to-block">
  <strong>Re: {{ role }} — {{ company }}</strong>
</div>

<div class="body-text">{{ body }}</div>

</body>
</html>
